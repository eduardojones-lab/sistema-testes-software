# URL de conexão com o PostgreSQL
# Formato: jdbc:postgresql://HOST:PORTA/NOME_DO_BANCO
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_testes

# Usuário e senha do PostgreSQL (altere se necessário)
spring.datasource.username=?
spring.datasource.password=?

# Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# update  = atualiza as tabelas automaticamente ao iniciar
# create  = apaga e recria as tabelas (cuidado: os dados serão perdidos!)
# validate= somente valida, não altera nada
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no console
spring.jpa.show-sql=true

# Formata as queries para ficarem mais legiveis
spring.jpa.properties.hibernate.format_sql=true

# Dialeto do PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta onde a aplicação vai rodar (padrão: 8080)
server.port=8080

# Nome da aplicação
spring.application.name=sistema-testes

# MENSAGENS DE ERRO DETALHADAS (apenas para desenvolvimento)
server.error.include-message=always
server.error.include-binding-errors=always
